name: Shiva Crypto Scanner 30m

on:
  workflow_dispatch:
  schedule:
    # Run just after each completed 30-minute candle.
    - cron: "2,32 * * * *"

permissions:
  contents: write

concurrency:
  group: shiva-crypto-scanner-30m
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check 30-minute Discord webhook configuration
        env:
          DISCORD_30M_WEBHOOK_URL: ${{ secrets.DISCORD_30M_WEBHOOK_URL }}
          DISCORD_STATUS_WEBHOOK_URL: ${{ secrets.DISCORD_STATUS_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_30M_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_30M_WEBHOOK_URL is not configured."
          else
            echo "DISCORD_30M_WEBHOOK_URL is configured."
          fi

          if [ -z "$DISCORD_STATUS_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_STATUS_WEBHOOK_URL is not configured."
          else
            echo "DISCORD_STATUS_WEBHOOK_URL is configured."
          fi

      - name: Run 30-minute scanner once
        env:
          SHIVA_TIMEFRAME: "30m"
          SHIVA_STATE_FILE: "alert_state_30m_verified.json"
          SHIVA_ALERT_COOLDOWN_SECONDS: "1800"
          SHIVA_SIGNAL_ALERT_COOLDOWN_SECONDS: "1800"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_30M_WEBHOOK_URL }}
          DISCORD_STATUS_WEBHOOK_URL: ${{ secrets.DISCORD_STATUS_WEBHOOK_URL }}
          COINSWITCH_API_KEY: ${{ secrets.COINSWITCH_API_KEY }}
          COINSWITCH_SECRET_KEY: ${{ secrets.COINSWITCH_SECRET_KEY }}
          COINSWITCH_EXCHANGE: ${{ secrets.COINSWITCH_EXCHANGE }}
        run: python scanner.py --once

      - name: Persist verified 30-minute alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f alert_state_30m_verified.json
          git diff --cached --quiet || git commit -m "Update verified 30m alert state"
          git push
