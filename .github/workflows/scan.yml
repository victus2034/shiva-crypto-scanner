name: Shiva Crypto Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: shiva-crypto-scanner
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Align scan time
        run: |
          minute=$(TZ=Asia/Kolkata date +%M)
          minute=$((10#$minute))

          if [ "$minute" -ge 0 ] && [ "$minute" -le 4 ]; then
            target=1
          elif [ "$minute" -ge 15 ] && [ "$minute" -le 24 ]; then
            target=20
          elif [ "$minute" -ge 30 ] && [ "$minute" -le 44 ]; then
            target=40
          else
            echo "Outside scan windows. Skipping this trigger."
            echo "RUN_SCAN=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ "$minute" -lt "$target" ]; then
            sleep_seconds=$(( (target - minute) * 60 ))
            echo "Waiting ${sleep_seconds}s to align scan to minute ${target}."
            sleep "$sleep_seconds"
          fi

          echo "RUN_SCAN=true" >> "$GITHUB_ENV"

      - name: Checkout repository
        if: env.RUN_SCAN == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: env.RUN_SCAN == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: env.RUN_SCAN == 'true'
        run: pip install -r requirements.txt

      - name: Run scanner once
        if: env.RUN_SCAN == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_STATUS_WEBHOOK_URL: ${{ secrets.DISCORD_STATUS_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py --once

      - name: Persist alert state
        if: env.RUN_SCAN == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f alert_state.json
          git diff --cached --quiet || git commit -m "Update alert state"
          git push
