name: Shiva NSE Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "10,31,50 3-9 * * 1-5"

permissions:
  contents: write

concurrency:
  group: shiva-nse-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Discord webhook configuration
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_NSE_WEBHOOK_URL: ${{ secrets.DISCORD_NSE_WEBHOOK_URL }}
          DISCORD_STATUS_WEBHOOK_URL: ${{ secrets.DISCORD_STATUS_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_NSE_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_NSE_WEBHOOK_URL is not configured. NSE alerts will fall back to DISCORD_WEBHOOK_URL."
          elif [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_NSE_WEBHOOK_URL is configured."
          else
            echo "DISCORD_NSE_WEBHOOK_URL is configured."
          fi

          if [ -z "$DISCORD_STATUS_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_STATUS_WEBHOOK_URL is not configured. NSE scanner status will fall back to alert webhook."
          else
            echo "DISCORD_STATUS_WEBHOOK_URL is configured."
          fi

      - name: Run NSE scanner once
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_NSE_WEBHOOK_URL: ${{ secrets.DISCORD_NSE_WEBHOOK_URL }}
          DISCORD_STATUS_WEBHOOK_URL: ${{ secrets.DISCORD_STATUS_WEBHOOK_URL }}
        run: python nse_scanner.py --once

      - name: Persist NSE alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f nse_alert_state.json
          if git diff --cached --quiet; then
            echo "No NSE alert state changes to save."
            exit 0
          fi

          git commit -m "Update NSE alert state"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi

            echo "::warning::NSE alert state push failed on attempt ${attempt}; refreshing branch before retry."
            git pull --rebase origin main || {
              echo "::warning::Could not rebase NSE alert state. Alerts were already sent, so not failing the scan."
              exit 0
            }
          done

          echo "::warning::Could not persist NSE alert state after retries. Alerts were already sent, so not failing the scan."
